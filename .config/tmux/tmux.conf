# OPTIONS
# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# KEYBINDS
# Change prefix
# unbind C-b
set -g prefix C-b
bind C-b send-prefix

# Reload config
bind R source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# APPEARANCE
set -g status-position top

# Status bar colors
set -g status-style 'bg=default fg=white'
# set -g status-style '#{?client_prefix,bg=green fg=white,bg=default fg=white}'
set -g status-left-length 20
set -g status-right-length 100

# Status bar content
# set -g status-left '#[bg=blue,fg=black,bold] #S #[bg=black,fg=white]'
set -g status-left '#{?client_prefix,#[bg=red fg=black bold],#[bg=blue fg=black bold]} #S #[default]'
set -g status-right ''

set -g window-status-style ''
set -g window-status-format ' #I:#W #F'
set -g window-status-current-format '#[fg=cyan,bold] #I:#W #F'
set -g window-status-bell-style 'fg=red'

set -g pane-border-lines single
set -g pane-border-style 'fg=brightblack'
set -g pane-border-format ''
set -g pane-active-border-style 'fg=cyan'

set -g message-style 'bg=brightyellow fg=brightwhite bold'

